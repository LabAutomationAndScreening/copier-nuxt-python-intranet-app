# Used ONLY by mutmut's type_check_command
# mutmut runs the checker from the `mutants/` subfolder. This config makes pyrefly check the generated
# mutants tree (gitignored, so use-ignore-files must be off) instead of the real source.
use-ignore-files = false
disable-project-excludes-heuristics = true
python-platform = "linux"
preset = "strict"
project-includes = ["backend/mutants/src/**"]
project-excludes = [
    "**/generated/**",
]
